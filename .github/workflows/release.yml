name: Release

# Builds installers for macOS, Windows, and Linux and attaches them to a GitHub
# Release. Trigger by pushing a version tag (e.g. `v0.1.0`) or run manually.
# The binary's embedded version comes from ide/src-tauri/tauri.conf.json — bump
# it to match the tag before releasing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal (Apple Silicon + Intel)
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri v2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ide/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./ide/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: ide
        run: pnpm install --frozen-lockfile

      - name: Stamp version from tag into the binary
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          f=ide/src-tauri/tauri.conf.json
          tmp="$(mktemp)"
          jq --arg v "$VER" '.version = $v' "$f" > "$tmp" && mv "$tmp" "$f"
          echo "stamped version => $VER"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ide
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: "EvorIDE ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}"
          releaseBody: |
            Download the installer for your OS below. See the docs to get started.

            **First launch (macOS):** the build isn't code-signed yet, so macOS will say it "cannot be verified". Either **right-click the app → Open** (then confirm once), or run:
            `xattr -dr com.apple.quarantine /Applications/EvorIDE.app`

            **Windows:** if SmartScreen warns, click **More info → Run anyway**.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
