name: CI

# Fast checks on every push / PR: the frontend builds, the Rust core tests pass,
# and the Tauri backend type-checks. (Full installers are built by release.yml.)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ide/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Workspace crates — test core, check all
        run: |
          cargo test -p eterm-core --locked
          cargo check --workspace --locked

      - name: IDE frontend — build
        working-directory: ide
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: IDE backend — type-check
        working-directory: ide/src-tauri
        run: cargo check --locked
